<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitor de Código de Barras com Área</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f5f5f5;
    margin: 0;
    padding: 20px;
}

h2 {
    color: #333;
}

.container {
    position: relative;
    display: inline-block;
    width: 100%;
    max-width: 420px;
}

video {
    width: 100%;
    border-radius: 10px;
    background: #000;
}

/* overlay escuro */
#overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

/* área de leitura */
#frame {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 75%;
    height: 25%;
    transform: translate(-50%, -50%);
    border: 3px solid #00ff00;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
    border-radius: 10px;
}

button {
    margin: 10px;
    padding: 12px 18px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    background: #007bff;
    color: white;
}

button:active {
    transform: scale(0.98);
}

#resultado {
    margin-top: 20px;
    font-size: 22px;
    font-weight: bold;
    color: green;
    word-break: break-all;
}

canvas {
    display: none;
}
</style>
</head>
<body>

<h2>Leitor de Código de Barras</h2>

<div class="container">
    <video id="video" autoplay playsinline></video>

    <div id="overlay">
        <div id="frame"></div>
    </div>
</div>

<canvas id="canvas"></canvas>

<div>
    <button id="start">Abrir câmera</button>
    <button id="capture">Ler código</button>
</div>

<div id="resultado">Aguardando...</div>

<script type="module">
import { BrowserMultiFormatReader }
from "https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/+esm";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const resultado = document.getElementById("resultado");

const reader = new BrowserMultiFormatReader();

let stream = null;

// abrir câmera
document.getElementById("start").addEventListener("click", async () => {
    try {
        stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: "environment"
            }
        });

        video.srcObject = stream;

        resultado.textContent = "Aponte o código dentro do retângulo verde";

    } catch (err) {
        console.error(err);
        resultado.textContent = err.name + " - " + err.message;
    }
});

// capturar e ler apenas área central
document.getElementById("capture").addEventListener("click", async () => {
    try {
        const ctx = canvas.getContext("2d");

        const vw = video.videoWidth;
        const vh = video.videoHeight;

        canvas.width = vw;
        canvas.height = vh;

        ctx.drawImage(video, 0, 0, vw, vh);

        // área central (ROI)
        const x = vw * 0.125;
        const y = vh * 0.375;
        const w = vw * 0.75;
        const h = vh * 0.25;

        const imageData = ctx.getImageData(x, y, w, h);

        const tempCanvas = document.createElement("canvas");
        tempCanvas.width = w;
        tempCanvas.height = h;

        const tctx = tempCanvas.getContext("2d");
        tctx.putImageData(imageData, 0, 0);

        const result = await reader.decodeFromCanvas(tempCanvas);

        resultado.textContent = "Código: " + result.getText();

    } catch (err) {
        console.log(err);
        resultado.textContent = "Nenhum código encontrado";
    }
});
</script>

</body>
</html>
