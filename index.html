<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitor de Código de Barras</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f4f4f4;
    margin: 0;
    padding: 20px;
}

h1 {
    color: #333;
}

video {
    width: 100%;
    max-width: 500px;
    border-radius: 10px;
    background: #000;
}

#resultado {
    margin-top: 20px;
    font-size: 22px;
    font-weight: bold;
    color: green;
    word-break: break-all;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 16px;
}
</style>
</head>
<body>

<h1>Leitor de Código de Barras</h1>

<video id="video" playsinline></video>

<div id="resultado">Clique para iniciar</div>

<button id="btn">Iniciar leitura</button>

<script type="module">
import { BrowserMultiFormatReader }
from "https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/+esm";

const video = document.getElementById("video");
const resultado = document.getElementById("resultado");
const btn = document.getElementById("btn");

let reader;

btn.addEventListener("click", async () => {
    try {
        resultado.textContent = "Abrindo câmera...";

        reader = new BrowserMultiFormatReader();

        await reader.decodeFromVideoDevice(
            null,
            video,
            (result, err) => {
                if (result) {
                    resultado.textContent = "Código: " + result.getText();
                    console.log(result.getText());
                }
            }
        );

        resultado.textContent = "Aponte para o código de barras";

    } catch (e) {
        console.error(e);
        resultado.textContent = "Erro: " + e.message;
    }
});
</script>

</body>
</html>
