<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitor de Código de Barras</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 20px;
    background: #f4f4f4;
}

h2 {
    color: #333;
}

.container {
    position: relative;
    display: inline-block;
    width: 100%;
    max-width: 420px;
}

video {
    width: 100%;
    border-radius: 10px;
    background: #000;
}

/* escurece tudo fora da área */
#overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

#frame {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 75%;
    height: 25%;
    transform: translate(-50%, -50%);
    border: 3px solid #00ff00;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.55);
    border-radius: 10px;
}

#resultado {
    margin-top: 20px;
    font-size: 22px;
    font-weight: bold;
    color: green;
    word-break: break-all;
}

#status {
    margin-top: 10px;
    color: #555;
}

canvas {
    display: none;
}
</style>
</head>
<body>

<h2>Leitor Automático de Código</h2>

<div class="container">
    <video id="video" autoplay playsinline></video>

    <div id="overlay">
        <div id="frame"></div>
    </div>
</div>

<div id="status">Iniciando câmera...</div>
<div id="resultado">Aguardando código...</div>

<canvas id="canvas"></canvas>

<script type="module">
import { BrowserMultiFormatReader }
from "https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/+esm";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const resultado = document.getElementById("resultado");
const status = document.getElementById("status");

const reader = new BrowserMultiFormatReader();

let stream;
let ativo = true;

// iniciar câmera automaticamente
async function iniciar() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: "environment",
                width: { ideal: 1280 },
                height: { ideal: 720 }
            }
        });

        video.srcObject = stream;

        status.textContent = "Aponte para o código dentro do quadrado";

        loop();

    } catch (err) {
        console.error(err);
        status.textContent = err.name + " - " + err.message;
    }
}

// loop de leitura contínua
async function loop() {
    if (!ativo) return;

    try {
        const ctx = canvas.getContext("2d");

        const vw = video.videoWidth;
        const vh = video.videoHeight;

        if (!vw || !vh) {
            requestAnimationFrame(loop);
            return;
        }

        canvas.width = vw;
        canvas.height = vh;

        ctx.drawImage(video, 0, 0, vw, vh);

        // área central (ROI)
        const x = vw * 0.12;
        const y = vh * 0.38;
        const w = vw * 0.76;
        const h = vh * 0.24;

        const imageData = ctx.getImageData(x, y, w, h);

        const tempCanvas = document.createElement("canvas");
        tempCanvas.width = w;
        tempCanvas.height = h;

        const tctx = tempCanvas.getContext("2d");
        tctx.putImageData(imageData, 0, 0);

        const result = await reader.decodeFromCanvas(tempCanvas);

        if (result) {
            resultado.textContent = "Código: " + result.getText();

            // vibração (se disponível)
            if (navigator.vibrate) {
                navigator.vibrate(150);
            }

            ativo = false; // trava após leitura
            status.textContent = "Leitura concluída";
            return;
        }

    } catch (e) {
        // silêncio proposital (não polui console)
    }

    requestAnimationFrame(loop);
}

iniciar();
</script>

</body>
</html>
