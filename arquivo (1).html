<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitor de Código de Barras</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 20px;
        }

        #scanner {
            width: 100%;
            max-width: 600px;
            margin: auto;
        }

        #resultado {
            margin-top: 20px;
            font-size: 1.3em;
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>

    <h2>Leitor de Código de Barras</h2>

    <div id="scanner"></div>

    <div id="resultado">
        Aguardando leitura...
    </div>

    <script>
        Quagga.init({
            inputStream: {
                name: "Live",
                type: "LiveStream",
                target: document.querySelector("#scanner"),
                constraints: {
                    facingMode: "environment"
                }
            },
            decoder: {
                readers: [
                    "ean_reader",
                    "ean_8_reader",
                    "code_128_reader",
                    "upc_reader",
                    "upc_e_reader"
                ]
            }
        }, function(err) {
            if (err) {
                console.error(err);
                alert("Erro ao iniciar a câmera.");
                return;
            }

            Quagga.start();
        });

        let ultimoCodigo = "";

        Quagga.onDetected(function(data) {
            const codigo = data.codeResult.code;

            if (codigo !== ultimoCodigo) {
                ultimoCodigo = codigo;

                document.getElementById("resultado").textContent =
                    "Código lido: " + codigo;

                console.log("Código detectado:", codigo);
            }
        });
    </script>

</body>
</html>
